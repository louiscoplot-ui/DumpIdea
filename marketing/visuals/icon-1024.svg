<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background rounded -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Glow blob center -->
  <ellipse cx="512" cy="480" rx="280" ry="260" fill="#58a6ff" opacity="0.07" filter="url(#softglow)"/>

  <!-- Drop shape (water drop = brain dump) -->
  <path d="M512 200
    C512 200, 340 370, 340 510
    C340 604 418 680 512 680
    C606 680 684 604 684 510
    C684 370 512 200 512 200 Z"
    fill="url(#drop)" filter="url(#glow)"/>

  <!-- Shine overlay on drop -->
  <path d="M512 200
    C512 200, 340 370, 340 510
    C340 604 418 680 512 680
    C606 680 684 604 684 510
    C684 370 512 200 512 200 Z"
    fill="url(#shine)"/>

  <!-- AI spark / star inside drop -->
  <text x="512" y="530"
    font-family="SF Pro Display, -apple-system, sans-serif"
    font-size="160"
    font-weight="900"
    fill="#ffffff"
    fill-opacity="0.95"
    text-anchor="middle"
    dominant-baseline="middle">✦</text>

  <!-- Bottom wordmark -->
  <text x="512" y="830"
    font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
    font-size="92"
    font-weight="800"
    fill="#ffffff"
    fill-opacity="0.92"
    text-anchor="middle"
    letter-spacing="-2">drople</text>
</svg>
