<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="150" cy="200" r="200" fill="#58a6ff" opacity="0.05" filter="url(#blur)"/>
  <circle cx="950" cy="900" r="250" fill="#a371f7" opacity="0.06" filter="url(#blur)"/>

  <!-- Title -->
  <text x="540" y="130" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="3">COMMENT ÇA MARCHE</text>
  <text x="540" y="210" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="62" font-weight="800" fill="#ffffff" text-anchor="middle">3 secondes.</text>
  <text x="540" y="275" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="62" font-weight="800" fill="url(#accent)" text-anchor="middle">C'est tout.</text>

  <!-- Step 1 -->
  <rect x="80" y="340" width="280" height="340" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="220" cy="400" r="32" fill="#58a6ff" fill-opacity="0.15" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="220" y="408" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="24" font-weight="800" fill="#58a6ff" text-anchor="middle">1</text>
  <text x="220" y="470" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="52" text-anchor="middle">⌨️</text>
  <text x="220" y="540" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Tu tapes</text>
  <text x="220" y="570" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">n'importe quoi,</text>
  <text x="220" y="592" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">dans ta langue</text>
  <text x="220" y="630" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" text-anchor="middle">💬</text>

  <!-- Arrow 1 -->
  <text x="390" y="530" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="48" fill="url(#accent)" text-anchor="middle">→</text>

  <!-- Step 2 -->
  <rect x="400" y="340" width="280" height="340" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="540" cy="400" r="32" fill="#a371f7" fill-opacity="0.15" stroke="#a371f7" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="540" y="408" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="24" font-weight="800" fill="#a371f7" text-anchor="middle">2</text>
  <text x="540" y="470" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="52" text-anchor="middle">✦</text>
  <text x="540" y="540" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">L'IA analyse</text>
  <text x="540" y="570" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">réécrit, classe,</text>
  <text x="540" y="592" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">ajoute une date</text>
  <text x="540" y="630" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" text-anchor="middle">🤖</text>

  <!-- Arrow 2 -->
  <text x="710" y="530" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="48" fill="url(#accent)" text-anchor="middle">→</text>

  <!-- Step 3 -->
  <rect x="720" y="340" width="280" height="340" rx="24" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="860" cy="400" r="32" fill="#3fb950" fill-opacity="0.15" stroke="#3fb950" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="860" y="408" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="24" font-weight="800" fill="#3fb950" text-anchor="middle">3</text>
  <text x="860" y="470" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="52" text-anchor="middle">✅</text>
  <text x="860" y="540" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">C'est rangé</text>
  <text x="860" y="570" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">to-do, idées, notes,</text>
  <text x="860" y="592" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">appels… tout trié</text>
  <text x="860" y="630" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" text-anchor="middle">🗂️</text>

  <!-- Example card -->
  <rect x="140" y="730" width="800" height="180" rx="20" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="180" y="775" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="18" fill="#8b949e">Tu tapes :</text>
  <text x="180" y="805" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="20" fill="#ffffff" font-style="italic">"faut que jappelle le dentiste mardi et acheter du lait"</text>
  <line x1="180" y1="825" x2="900" y2="825" stroke="#30363d" stroke-width="1"/>
  <text x="180" y="858" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="18" fill="#8b949e">Drople crée :</text>
  <rect x="340" y="842" width="90" height="30" rx="8" fill="#58a6ff22" stroke="#58a6ff55" stroke-width="1"/>
  <text x="385" y="862" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">📞 Call</text>
  <rect x="450" y="842" width="120" height="30" rx="8" fill="#3fb95022" stroke="#3fb95055" stroke-width="1"/>
  <text x="510" y="862" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="14" fill="#3fb950" text-anchor="middle">✓ To-do</text>
  <text x="590" y="862" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="18" fill="#8b949e">+ date 📅 Mardi</text>

  <!-- Bottom -->
  <text x="540" y="970" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="26" font-weight="700" fill="url(#accent)" text-anchor="middle">dropleapp.com</text>
</svg>
