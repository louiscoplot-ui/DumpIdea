<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="300" r="250" fill="#58a6ff" opacity="0.06" filter="url(#blur)"/>
  <circle cx="900" cy="800" r="300" fill="#a371f7" opacity="0.07" filter="url(#blur)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Top badge -->
  <rect x="390" y="160" width="300" height="44" rx="22" fill="#58a6ff" fill-opacity="0.12" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="540" y="188" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="17" font-weight="600" fill="#58a6ff" text-anchor="middle" letter-spacing="2">NOUVEAU · GRATUIT</text>

  <!-- Main title -->
  <text x="540" y="320" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="110" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="-3">Drople</text>

  <!-- Tagline line 1 -->
  <text x="540" y="420" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="42" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.9">Vide ton cerveau.</text>
  <!-- Tagline line 2 -->
  <text x="540" y="478" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">L'IA fait le reste.</text>

  <!-- Divider -->
  <rect x="460" y="520" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="120" y="570" width="250" height="60" rx="30" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="245" y="607" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">✓  Classement IA</text>

  <!-- Pill 2 -->
  <rect x="415" y="570" width="250" height="60" rx="30" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="607" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">📅  Calendrier</text>

  <!-- Pill 3 -->
  <rect x="710" y="570" width="250" height="60" rx="30" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="835" y="607" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">🔔  Rappels</text>

  <!-- Pill 4 -->
  <rect x="175" y="652" width="250" height="60" rx="30" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="300" y="689" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">👥  Groupes</text>

  <!-- Pill 5 -->
  <rect x="655" y="652" width="250" height="60" rx="30" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="780" y="689" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" opacity="0.9">🌍  Multilingue</text>

  <!-- Mock app input -->
  <rect x="140" y="760" width="800" height="80" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="808" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" fill="#8b949e" text-anchor="start">"Rappeler d'appeler le dentiste mardi matin…"</text>
  <rect x="840" y="775" width="80" height="50" rx="12" fill="url(#accent)"/>
  <text x="880" y="807" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">IA ✦</text>

  <!-- Bottom URL -->
  <text x="540" y="930" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" font-weight="600" fill="url(#accent)" text-anchor="middle">dropleapp.com</text>

  <!-- Bottom tagline -->
  <text x="540" y="980" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Disponible maintenant · Gratuit · iPhone &amp; Android</text>
</svg>
